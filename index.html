<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale - Hybrid Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: url('pozadina.png') no-repeat center center fixed; 
            background-size: cover; 
            height: 100vh; 
            margin: 0; 
        }
        .top-linija { background: #439a97; height: 60px; border-bottom: 2px solid black; }
        .sidebar-desktop { background: #f0f0f0; width: 200px; height: calc(100vh - 60px); border-right: 2px solid black; float: left; }
        .panel-desktop { background: #439a97; border: 3px solid black; border-radius: 20px; padding: 60px; width: 500px; }
      
        .login-box-mobile {
            background-color: rgba(0, 0, 0, 0.8);
            border: 5px solid #1a1a1a;
            border-radius: 25px;
            padding: 30px;
            width: 85%;
            max-width: 320px;
        }
        .btn-cr-mobile {
            background-color: #f1f1f1;
            border: 4px solid #000;
            border-radius: 12px;
            color: #000;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 10px 0;
            margin-bottom: 15px;
            display: block;
            width: 100%;
            text-decoration: none;
            font-family: 'Arial Black', sans-serif;
            text-align: center;
        }
        
        .dugme-desktop {
            background: #ddd;
            border: 2px solid black;
            font-weight: bold;
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 5px;
            text-decoration: none;
            color: black;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="d-none d-md-block h-100">
        <div class="top-linija">
            <img src="logo.png" style="height: 50px; margin-left: 35px; margin-top: 4px">
        </div>

        <div class="sidebar-desktop d-flex flex-column justify-content-center align-items-center">
            <img src="lock.png" style="width: 120px;">
            <p class="mt-3"><b>you must<br>log in first</b></p>
        </div>

        <div class="d-flex justify-content-center align-items-center" style="height: calc(100vh - 60px); margin-left: 200px;">
            <div class="panel-desktop shadow">
                <a href="home.html" class="dugme-desktop">LOGIN</a>
                <a href="#" class="dugme-desktop">REGISTER</a>
            </div>
        </div>
    </div>

    <div class="d-flex d-md-none justify-content-center align-items-center vh-100 w-100">
        <div class="login-box-mobile text-center">
            <a href="home.html" class="btn-cr-mobile">LOGIN</a>
            <a href="#" class="btn-cr-mobile">REGISTER</a>
        </div>
    </div>

</body>
</html>
