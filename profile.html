<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: url('pozadina.png') no-repeat center center fixed; background-size: cover; height: 100vh; margin: 0; }
        /* DESKTOP */
        .top-linija { background: #439a97; height: 60px; border-bottom: 2px solid black; }
        .sidebar-desktop { background: #f0f0f0; width: 200px; height: calc(100vh - 60px); border-right: 2px solid black; float: left; }
        .meni-link { display: block; padding: 12px 20px; color: black; text-decoration: none; font-weight: bold; border-bottom: 1px solid #ccc; text-align: center; }
        .panel-desktop { background: #439a97; border: 3px solid black; border-radius: 20px; padding: 40px; width: 500px; text-align: center; font-weight: bold; }
        /* MOBILE */
        .mobile-header { background: #000; color: white; padding: 10px; font-weight: bold; border-bottom: 3px solid #439a97; }
        .btn-profile-mobile { background: #439a97; border: 3px solid #000; color: #000; font-weight: 900; font-size: 20px; padding: 15px; margin-bottom: 15px; width: 100%; display: block; text-decoration: none; text-align: center; font-family: 'Arial Black'; }
    </style>
</head>
<body>
    <div class="d-none d-md-block h-100">
        <div class="top-linija"><img src="logo.png" style="height: 50px; margin-left: 35px; margin-top: 4px"></div>
        <div class="sidebar-desktop">
            <a href="profile.html" class="meni-link" style="background:#ddd">Profile</a>
            <a href="deck.html" class="meni-link">Current deck</a>
            <a href="cards.html" class="meni-link">Cards</a>
            <a href="battles.html" class="meni-link">Battles</a>
            <a href="clans.html" class="meni-link">Clans</a>
        </div>
        <div class="d-flex justify-content-center align-items-center" style="height: calc(100vh - 60px); margin-left: 200px;">
            <div class="panel-desktop shadow"><h2>Profile</h2><p>Player: aleksas</p><p>Trophies: 15,000</p></div>
        </div>
    </div>
    <div class="d-flex d-md-none flex-column h-100">
        <div class="mobile-header d-flex justify-content-between px-3"><span>Profile</span><span>🏠</span></div>
        <div class="container py-5 px-4 text-center">
            <a href="player_info.html" class="btn-profile-mobile">Player Info</a>
            <a href="statistics.html" class="btn-profile-mobile">Statistics</a>
            <a href="actions.html" class="btn-profile-mobile">Actions</a>
        </div>
    </div>
</body>
</html>
