<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: url('pozadina.png') no-repeat center center fixed; 
            background-size: cover; 
            height: 100vh; 
            margin: 0; 
        }

        .top-linija { background: #439a97; height: 60px; border-bottom: 2px solid black; }
        .sidebar-desktop { background: #f0f0f0; width: 200px; height: calc(100vh - 60px); border-right: 2px solid black; float: left; }
        .sidebar-naslov { font-weight: bold; font-size: 24px; text-align: center; border-bottom: 2px solid black; padding: 15px 0; margin: 0; background: white; }
        .meni-link { display: block; padding: 12px 20px; color: black; text-decoration: none; font-weight: bold; border-bottom: 1px solid #ccc; text-align: center; }
        .panel-desktop { background: #439a97; border: 3px solid black; border-radius: 20px; padding: 80px; width: 500px; color: white; text-align: center; }

        .mobile-header { background: #000; color: white; padding: 10px; font-weight: bold; border-bottom: 3px solid #439a97; }
        .mobile-container { padding: 15px; width: 100%; max-width: 400px; }
        
        .cr-card-mobile {
            background-color: #439a97;
            border: 3px solid #000;
            border-radius: 0;
            margin-bottom: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #000;
            font-weight: 900;
            font-size: 22px;
            font-family: 'Arial Black', sans-serif;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
        }
        .cr-card-mobile img { height: 60px; }
        .bottom-nav-mobile {
            background: #439a97;
            border: 3px solid #000;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            font-size: 14px;
        }
        .bottom-nav-mobile a { color: black; text-decoration: none; border-right: 2px solid black; padding-right: 10px; }
        .bottom-nav-mobile a:last-child { border-right: none; }
    </style>
</head>
<body>

    <div class="d-none d-md-block h-100">
        <div class="top-linija">
            <img src="logo.png" style="height: 50px; margin-left: 35px; margin-top: 4px">
        </div>

        <div class="sidebar-desktop">
            <p class="sidebar-naslov">HOME</p>
            <a href="profile.html" class="meni-link">Profile</a>
            <a href="deck.html" class="meni-link">Current deck</a>
            <a href="cards.html" class="meni-link">Cards</a>
            <a href="battles.html" class="meni-link">Battles</a>
            <a href="clans.html" class="meni-link">Clans</a>
            <img src="k.png"stzle="width: 160px; height:auto;">
        </div>

        <div class="d-flex justify-content-center align-items-center" style="height: calc(100vh - 60px); margin-left: 200px;">
            <div class="panel-desktop shadow">
                <h1 class="display-3 fw-bold">Welcome<br>aleksa5</h1>
            </div>
        </div>
    </div>

    <div class="d-flex d-md-none flex-column h-100">
        <div class="mobile-header d-flex justify-content-between align-items-center px-3">
            <span>Home</span>
            <img src="logo_mini.png" style="height: 25px;"> </div>

        <div class="flex-grow-1 d-flex justify-content-center align-items-center">
            <div class="mobile-container">
                
                <a href="profile.html" class="cr-card-mobile">
                    <span>Profile</span>
                    <img src="king_icon.png" alt=""> </a>

                <a href="deck.html" class="cr-card-mobile">
                    <img src="valkyrie_icon.png" alt=""> <span>Current<br>Deck</span>
                </a>

                <div class="bottom-nav-mobile mt-4">
                    <a href="cards.html">CARDS</a>
                    <a href="battles.html">BATTLES</a>
                    <a href="clans.html">CLAN</a>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
